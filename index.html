<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%}
body{background:#fbfbfd;font-family:-apple-system,'SF Pro Display','SF Pro Text',BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;color:#1d1d1f;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
.ap-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;position:relative}
.ap-left{position:relative;background:#fbfbfd;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;border-right:0.5px solid rgba(0,0,0,.06)}
.ap-candles{position:relative;width:100%;max-width:380px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center}
.ap-candle-svg{width:100%;height:100%;display:block;overflow:visible}
.ap-caption{position:relative;z-index:2;text-align:center;margin-top:48px;opacity:0;transform:translateY(12px);animation:apFadeUp .8s cubic-bezier(.22,.61,.36,1) .9s forwards}
@keyframes apFadeUp{to{opacity:1;transform:translateY(0)}}
.ap-caption-eyebrow{font-size:11px;letter-spacing:2px;color:#86868b;text-transform:uppercase;font-weight:500;margin-bottom:12px}
.ap-caption-h{font-size:28px;line-height:1.15;font-weight:600;color:#1d1d1f;letter-spacing:-0.6px;margin:0}
.ap-caption-sub{font-size:15px;color:#6e6e73;margin-top:10px;letter-spacing:-0.1px;line-height:1.4}
.ap-right{display:flex;flex-direction:column;justify-content:center;padding:60px 56px;background:#fff;position:relative;max-width:560px;width:100%;margin:0 auto}
.ap-brand{display:flex;align-items:center;gap:10px;margin-bottom:48px}
.ap-brand-logo{width:28px;height:28px;border-radius:6px;object-fit:cover;background:#0a0d12}
.ap-brand-name{font-size:14px;font-weight:500;color:#1d1d1f;letter-spacing:-0.1px}
.ap-h{font-size:32px;font-weight:600;color:#1d1d1f;letter-spacing:-0.8px;line-height:1.1;margin:0 0 10px}
.ap-sub{font-size:15px;color:#86868b;margin:0 0 40px;letter-spacing:-0.1px}
.ap-field{margin-bottom:14px}
.ap-input{position:relative;display:flex;align-items:center;background:#f5f5f7;border:0.5px solid transparent;border-radius:12px;transition:all .25s ease}
.ap-input:focus-within{background:#fff;border-color:#1d1d1f;box-shadow:0 0 0 4px rgba(0,0,0,.04)}
.ap-input input{flex:1;background:transparent;border:none;outline:none;color:#1d1d1f;font-size:15px;padding:14px 16px;font-family:inherit;letter-spacing:-0.1px;width:100%;min-width:0}
.ap-input input::placeholder{color:#86868b}
.ap-eye{background:none;border:none;padding:0 16px 0 8px;cursor:pointer;color:#86868b;display:flex;align-items:center;height:46px;flex-shrink:0}
.ap-eye:hover{color:#1d1d1f}
.ap-row{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 28px;font-size:13px;flex-wrap:wrap;gap:10px}
.ap-check{display:flex;align-items:center;gap:8px;color:#6e6e73;cursor:pointer;user-select:none;letter-spacing:-0.1px}
.ap-check input{width:14px;height:14px;accent-color:#1d1d1f;margin:0}
.ap-forgot{color:#0071e3;cursor:pointer;text-decoration:none;transition:color .15s;letter-spacing:-0.1px;background:none;border:none;font-size:inherit;padding:0;font-family:inherit}
.ap-forgot:hover{color:#0077ed;text-decoration:underline}
.ap-submit{width:100%;padding:14px;background:#1d1d1f;color:#fff;border:none;border-radius:980px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,transform .1s;letter-spacing:-0.1px;font-family:inherit}
.ap-submit:hover{background:#000}
.ap-submit:active{transform:scale(.98)}
.ap-submit:disabled{cursor:wait;opacity:.7}
.ap-spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:apspin .7s linear infinite;display:none}
.ap-submit.loading .ap-spin{display:block}
@keyframes apspin{to{transform:rotate(360deg)}}
.ap-divider{display:flex;align-items:center;gap:12px;margin:24px 0 20px;color:#86868b;font-size:12px}
.ap-divider::before,.ap-divider::after{content:"";flex:1;height:0.5px;background:rgba(0,0,0,.1)}
.ap-google{width:100%;padding:13px;background:#fff;color:#1d1d1f;border:0.5px solid rgba(0,0,0,.15);border-radius:980px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,transform .1s,border-color .2s;letter-spacing:-0.1px;font-family:inherit}
.ap-google:hover{background:#f5f5f7;border-color:rgba(0,0,0,.25)}
.ap-google:active{transform:scale(.98)}
.ap-google svg{width:18px;height:18px;flex-shrink:0}
.ap-signup{text-align:center;margin-top:24px;font-size:13px;color:#86868b;letter-spacing:-0.1px}
.ap-signup a{color:#0071e3;text-decoration:none;cursor:pointer}
.ap-signup a:hover{text-decoration:underline}
.ap-toast{position:fixed;top:24px;left:50%;transform:translate(-50%,-140%);background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;transition:transform .35s cubic-bezier(.22,.61,.36,1);z-index:100;letter-spacing:-0.1px;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.ap-toast.show{transform:translate(-50%,0)}
.ap-toast.error{background:#d70015}
@media (max-width:768px){
  .ap-wrap{grid-template-columns:1fr}
  .ap-left{padding:44px 32px 16px;border-right:none}
  .ap-candles{max-width:200px}
  .ap-caption{margin-top:28px}
  .ap-caption-h{font-size:22px}
  .ap-caption-sub{font-size:14px}
  .ap-right{padding:28px 24px 48px}
  .ap-h{font-size:26px}
  .ap-sub{margin-bottom:28px}
  .ap-brand{margin-bottom:28px}
}
</style>
</head>

<h1 class="ap-h">Sign in.</h1>
<p class="ap-sub">Use your trader ID to continue.</p>

<form id="ap-form" autocomplete="on" novalidate>
<div class="ap-field">
<div class="ap-input">
<input type="email" id="ap-user" placeholder="Email" autocomplete="username" required>
</div>
</div>
<div class="ap-field">
<div class="ap-input">
<input type="password" id="ap-pw" placeholder="Password" autocomplete="current-password" required>
<button type="button" class="ap-eye" id="ap-eye" aria-label="toggle password">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
</div>
<div class="ap-row">
<label class="ap-check"><input type="checkbox" id="ap-remember">Keep me signed in</label>
<button type="button" class="ap-forgot" id="ap-forgot">Forgot password?</button>
</div>
<button type="submit" class="ap-submit" id="ap-submit">
<span class="ap-spin"></span>
<span id="ap-btn-text">Continue</span>
</button>
</form>

<div class="ap-divider">or</div>

<div class="ap-toast" id="ap-toast">Welcome back.</div>

<script>
(function(){
  var bearBody=document.getElementById('ap-bear-body'),bearUp=document.getElementById('ap-bear-wick-up'),bearDown=document.getElementById('ap-bear-wick-down'),bearLabel=document.getElementById('ap-bear-label');
  var bullBody=document.getElementById('ap-bull-body'),bullUp=document.getElementById('ap-bull-wick-up'),bullDown=document.getElementById('ap-bull-wick-down'),bullLabel=document.getElementById('ap-bull-label');
  var baseline=document.getElementById('ap-baseline'),baselineLbl=document.getElementById('ap-baseline-lbl');
  var BASELINE_Y=180,BOTTOM=290,BULL_REST_TOP=150,BEAR_REST_TOP=70,AMPLITUDE=80;
  function easeInOut(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
  function easeOutCubic(x){return 1-Math.pow(1-x,3)}
  function setBullTop(top){bullBody.setAttribute('y',top);bullBody.setAttribute('height',BOTTOM-top);bullUp.setAttribute('y1',top-36);bullUp.setAttribute('y2',top);bullDown.setAttribute('y1',BOTTOM);bullDown.setAttribute('y2',BOTTOM+8);bullLabel.setAttribute('y',top-14)}
  function setBearTop(top){bearBody.setAttribute('y',top);bearBody.setAttribute('height',BOTTOM-top);bearUp.setAttribute('y1',top-36);bearUp.setAttribute('y2',top);bearDown.setAttribute('y1',BOTTOM);bearDown.setAttribute('y2',BOTTOM+8);bearLabel.setAttribute('y',top-14)}
  var entryStart=null;
  function entry(ts){
    if(entryStart===null)entryStart=ts;
    var elapsed=ts-entryStart;
    var baseProgress=Math.min(1,elapsed/400);
    baseline.setAttribute('opacity',(baseProgress*0.9).toFixed(2));
    baselineLbl.setAttribute('opacity',(baseProgress*0.7).toFixed(2));
    var bearP=Math.max(0,Math.min(1,(elapsed-150)/750));
    setBearTop(BOTTOM-easeOutCubic(bearP)*(BOTTOM-110));
    var bullP=Math.max(0,Math.min(1,(elapsed-250)/750));
    setBullTop(BOTTOM-easeOutCubic(bullP)*(BOTTOM-90));
    if(elapsed>900){
      var labelP=Math.min(1,(elapsed-900)/400);
      bearLabel.setAttribute('opacity',labelP.toFixed(2));
      bullLabel.setAttribute('opacity',labelP.toFixed(2));
      bearDown.setAttribute('opacity',labelP.toFixed(2));
      bullDown.setAttribute('opacity',labelP.toFixed(2));
    }
    if(elapsed<1400)requestAnimationFrame(entry);
    else loop();
  }
  requestAnimationFrame(entry);
  var t=0;
  function loop(){
    t+=0.006;
    var phase=easeInOut((Math.sin(t)+1)/2);
    var bullTop=BULL_REST_TOP-phase*AMPLITUDE;
    var bearTop=BEAR_REST_TOP+phase*AMPLITUDE;
    setBullTop(bullTop);
    setBearTop(bearTop);
    bullLabel.textContent='+'+((BASELINE_Y-bullTop)/AMPLITUDE*1.8+0.6).toFixed(2)+'%';
    bearLabel.textContent='−'+((bearTop-BASELINE_Y)/AMPLITUDE*1.4+0.4).toFixed(2)+'%';
    requestAnimationFrame(loop);
  }

  var pw=document.getElementById('ap-pw');
  document.getElementById('ap-eye').addEventListener('click',function(){pw.type=pw.type==='password'?'text':'password'});

  var toast=document.getElementById('ap-toast'),toastTimer;
  function showToast(msg,isError){
    toast.textContent=msg;
    toast.classList.toggle('error',!!isError);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){toast.classList.remove('show')},2500);
  }

  document.getElementById('ap-form').addEventListener('submit',function(e){
    e.preventDefault();
    var sub=document.getElementById('ap-submit');
    if(sub.classList.contains('loading'))return;
    var email=document.getElementById('ap-user').value.trim();
    var password=pw.value;
    if(!email||!password){showToast('Please fill in both fields',true);return}
    sub.classList.add('loading');sub.disabled=true;
    document.getElementById('ap-btn-text').textContent='Verifying';
    setTimeout(function(){
      document.getElementById('ap-btn-text').textContent='Authorized';
      showToast('Welcome back.');
      setTimeout(function(){
        sub.classList.remove('loading');sub.disabled=false;
        document.getElementById('ap-btn-text').textContent='Continue';
      },2000);
    },1400);
  });

  document.getElementById('ap-google').addEventListener('click',function(){showToast('Connecting to Google...')});
  document.getElementById('ap-forgot').addEventListener('click',function(){showToast('Password reset link sent.')});
  document.getElementById('ap-signup-link').addEventListener('click',function(){showToast('Sign up coming soon.')});
})();
</script>
